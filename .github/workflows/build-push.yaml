name: Build and Push to ECR

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/**'

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: connected-vehicle-demo
  ECR_REGISTRY: 526247032735.dkr.ecr.us-west-2.amazonaws.com

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CONNECTED_APP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CONNECTED_APP_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build, tag, and push image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="sha-$SHORT_SHA"
          docker build --platform linux/arm64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "Pushed $ECR_REGISTRY/$ECR_REPOSITORY:latest and :$IMAGE_TAG"

      - name: Update K8s deployment manifests
        run: |
          FULL_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          for f in k8s/deployments/*.yaml; do
            sed -i "s|image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:.*|image: ${FULL_IMAGE}|g" "$f"
          done
          if git diff --quiet k8s/deployments/; then
            echo "No image tag changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add k8s/deployments/
            git commit -m "ci: update deployment images to $IMAGE_TAG"
            git push
          fi
