name: Build and Push to ECR

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/**'

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: connected-vehicle-demo
  ECR_REGISTRY: 526247032735.dkr.ecr.us-west-2.amazonaws.com

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CONNECTED_APP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CONNECTED_APP_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build, tag, and push image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build --platform linux/arm64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:sha-$SHORT_SHA \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:sha-$SHORT_SHA
          echo "Pushed $ECR_REGISTRY/$ECR_REPOSITORY:latest and :sha-$SHORT_SHA"
