apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-api
  namespace: connected-vehicle
  labels:
    app: vehicle-api
    tier: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vehicle-api
  template:
    metadata:
      labels:
        app: vehicle-api
        tier: gateway
    spec:
      serviceAccountName: connected-vehicle-sa
      containers:
        - name: vehicle-api
          image: 526247032735.dkr.ecr.us-west-2.amazonaws.com/connected-vehicle-demo:sha-74bd6c8
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: demo-config
          env:
            - name: SERVICE_NAME
              value: "vehicle-api"
            - name: UPSTREAM_TELEMETRY
              value: "http://telemetry-ingest.connected-vehicle.svc:80"
            - name: UPSTREAM_TRIP
              value: "http://trip-service.connected-vehicle.svc:80"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vehicle-api
  namespace: connected-vehicle
  labels:
    app: vehicle-api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    external-dns.alpha.kubernetes.io/hostname: api.aws.sandbox.runwhen.com
spec:
  type: LoadBalancer
  selector:
    app: vehicle-api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
