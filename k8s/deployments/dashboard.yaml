apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: connected-vehicle
  labels:
    app: dashboard
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
        tier: frontend
    spec:
      serviceAccountName: connected-vehicle-sa
      containers:
        - name: dashboard
          image: 526247032735.dkr.ecr.us-west-2.amazonaws.com/connected-vehicle-demo:sha-74bd6c8
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: demo-config
          env:
            - name: SERVICE_NAME
              value: "dashboard"
            - name: UPSTREAM_VEHICLE_API
              value: "http://vehicle-api.connected-vehicle.svc:80"
            - name: UPSTREAM_NOTIFICATION
              value: "http://notification-service.connected-vehicle.svc:80"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: connected-vehicle
  labels:
    app: dashboard
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    external-dns.alpha.kubernetes.io/hostname: dashboard.aws.sandbox.runwhen.com
spec:
  type: LoadBalancer
  selector:
    app: dashboard
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
