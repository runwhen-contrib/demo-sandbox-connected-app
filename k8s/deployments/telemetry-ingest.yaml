apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-ingest
  namespace: connected-vehicle
  labels:
    app: telemetry-ingest
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telemetry-ingest
  template:
    metadata:
      labels:
        app: telemetry-ingest
        tier: backend
    spec:
      serviceAccountName: connected-vehicle-sa
      containers:
        - name: telemetry-ingest
          image: 526247032735.dkr.ecr.us-west-2.amazonaws.com/connected-vehicle-demo:sha-98fbfd9
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: demo-config
          env:
            - name: SERVICE_NAME
              value: "telemetry-ingest"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-ingest
  namespace: connected-vehicle
  labels:
    app: telemetry-ingest
spec:
  type: ClusterIP
  selector:
    app: telemetry-ingest
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
