apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notification-service-ingress
  namespace: connected-vehicle
spec:
  podSelector:
    matchLabels:
      app: notification-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: dashboard
      ports:
        - protocol: TCP
          port: 8000
