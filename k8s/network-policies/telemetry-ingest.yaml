apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: telemetry-ingest-ingress
  namespace: connected-vehicle
spec:
  podSelector:
    matchLabels:
      app: telemetry-ingest
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: vehicle-api
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: telemetry-ingest-egress
  namespace: connected-vehicle
spec:
  podSelector:
    matchLabels:
      app: telemetry-ingest
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 443
    # EKS Pod Identity Agent (link-local credential endpoint)
    - to:
        - ipBlock:
            cidr: 169.254.170.23/32
      ports:
        - protocol: TCP
          port: 80
